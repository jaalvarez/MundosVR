<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bosque VR Pro - Movimiento</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        let scene, camera, renderer, playerGroup;
        let controller1, controller2;
        let frutas = [];
        const clock = new THREE.Clock();

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            // --- NUEVO: GRUPO DEL JUGADOR ---
            // Esto es lo que moveremos con los joysticks
            playerGroup = new THREE.Group();
            playerGroup.add(camera);
            scene.add(playerGroup);

            // Iluminación
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Suelo
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshPhongMaterial({ color: 0x2d5a27 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // Configurar Mandos
            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('selectstart', onSelectStart);
            playerGroup.add(controller1); // Los mandos se mueven con el jugador

            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('selectstart', onSelectStart);
            playerGroup.add(controller2);

            const modelFactory = new XRControllerModelFactory();
            controller1.add(modelFactory.createControllerModel(controller1));
            controller2.add(modelFactory.createControllerModel(controller2));

            // Bosque
            for (let i = 0; i < 60; i++) {
                crearArbol(Math.random() * 100 - 50, Math.random() * 100 - 50);
            }

            renderer.setAnimationLoop(render);
        }

        function crearArbol(x, z) {
            const grupo = new THREE.Group();
            const tronco = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2.5), new THREE.MeshPhongMaterial({color: 0x4d2926}));
            tronco.position.y = 1.25;
            const copa = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshPhongMaterial({color: 0x1a471a}));
            copa.position.y = 3;
            grupo.add(tronco, copa);

            for(let i=0; i<3; i++){
                const fruta = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshPhongMaterial({color: 0xff0000}));
                fruta.position.set(Math.random()*1.5-0.75, 2.2 + Math.random(), Math.random()*1.5-0.75);
                frutas.push(fruta);
                grupo.add(fruta);
            }
            grupo.position.set(x, 0, z);
            scene.add(grupo);
        }

        function handleMovement(delta) {
            const session = renderer.xr.getSession();
            if (!session) return;

            // Recorremos los mandos conectados
            for (const source of session.inputSources) {
                if (!source.gamepad) continue;

                const axes = source.gamepad.axes; 
                // axes[2] es horizontal, axes[3] es vertical en el joystick
                
                // Mando Izquierdo: Movimiento (Caminar)
                if (source.handedness === 'left') {
                    const speed = 3 * delta;
                    // Obtenemos la dirección hacia donde mira la cámara pero ignoramos la altura (Y)
                    const direction = new THREE.Vector3();
                    camera.getWorldDirection(direction);
                    direction.y = 0;
                    direction.normalize();

                    const sideways = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

                    // Adelante/Atrás
                    playerGroup.position.addScaledVector(direction, -axes[3] * speed);
                    // Izquierda/Derecha
                    playerGroup.position.addScaledVector(sideways, axes[2] * speed);
                }

                // Mando Derecho: Rotación
                if (source.handedness === 'right') {
                    const rotationSpeed = 2 * delta;
                    // Girar el grupo del jugador sobre el eje Y
                    playerGroup.rotation.y -= axes[2] * rotationSpeed;
                }
            }
        }

        function onSelectStart(event) {
            const controller = event.target;
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.extractRotation(controller.matrixWorld);

            const raycaster = new THREE.Raycaster();
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const intersects = raycaster.intersectObjects(frutas);
            if (intersects.length > 0) {
                const item = intersects[0].object;
                if (intersects[0].distance < 4) { // Solo si estás cerca
                    item.visible = false;
                    frutas = frutas.filter(f => f !== item);
                }
            }
        }

        function render() {
            const delta = clock.getDelta();
            handleMovement(delta); // Procesar movimiento en cada frame
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
