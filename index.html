<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bosque VR - Gatillo y Láser</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script ipe="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';
        import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';

        let scene, camera, renderer, playerGroup;
        let controller1, controller2;
        let raycaster;
        let frutas = [];
        const clock = new THREE.Clock();

        // --- PALETAS DE COLORES ---
        const coloresCopa = [
            0x1a471a, // Verde pino oscuro
            0x2d5a27, // Verde bosque medio
            0x3e7a3a, // Verde hierba
            0x5c9a58, // Verde musgo claro
            0x123512  // Verde muy oscuro
        ];

        const coloresFruta = [
            0xff0000, // Rojo brillante
            0xffd700, // Dorado/Amarillo
            0xffa500, // Naranja
            0x800080, // Púrpura/Mora
            0x00ff00  // Verde lima (fruta inmadura)
        ];

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 0, 70);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

            playerGroup = new THREE.Group();
            playerGroup.add(camera);
            scene.add(playerGroup);

            // Iluminación
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // Suelo
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 200),
                new THREE.MeshPhongMaterial({ color: 0x224422 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- CONFIGURACIÓN DE MANDOS Y LÁSER ---
            raycaster = new THREE.Raycaster();

            // Función para crear la línea del láser
            const buildControllerPointer = () => {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0, 0, -5) // El láser mide 5 metros
                ]);
                const material = new THREE.LineBasicMaterial({ 
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.5 
                });
                return new THREE.Line(geometry, material);
            };

            const controllerModelFactory = new XRControllerModelFactory();

            // Mando 1
            controller1 = renderer.xr.getController(0);
            controller1.addEventListener('selectstart', onSelectStart); // Gatillo
            controller1.add(buildControllerPointer()); // Añadir láser visual
            playerGroup.add(controller1);

            const conGrip1 = renderer.xr.getControllerGrip(0);
            conGrip1.add(controllerModelFactory.createControllerModel(conGrip1));
            playerGroup.add(conGrip1);

            // Mando 2
            controller2 = renderer.xr.getController(1);
            controller2.addEventListener('selectstart', onSelectStart); // Gatillo
            controller2.add(buildControllerPointer()); // Añadir láser visual
            playerGroup.add(controller2);

            const conGrip2 = renderer.xr.getControllerGrip(1);
            conGrip2.add(controllerModelFactory.createControllerModel(conGrip2));
            playerGroup.add(conGrip2);

            // Crear Bosque
            for (let i = 0; i < 60; i++) {
                crearArbol(Math.random() * 100 - 50, Math.random() * 100 - 50);
            }

            renderer.setAnimationLoop(render);
        }

        function crearArbol(x, z) {
            const grupo = new THREE.Group();
            const tronco = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 2.5), new THREE.MeshPhongMaterial({color: 0x4d2926}));
            tronco.position.y = 1.25;

            const copaColor = coloresCopa[Math.floor(Math.random() * coloresCopa.length)];
            const copaRadius = 1.5;
            const copaY = 3;
            const copa = new THREE.Mesh(new THREE.SphereGeometry(copaRadius, 16, 16), new THREE.MeshPhongMaterial({color: copaColor}));
            copa.position.y = copaY;
            grupo.add(tronco, copa);

            for(let i=0; i<4; i++){
                const fColor = coloresFruta[Math.floor(Math.random() * coloresFruta.length)];
                const fruta = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshPhongMaterial({color: fColor}));
                
                let vec = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                vec.multiplyScalar(copaRadius + 0.05);
                fruta.position.set(vec.x, vec.y + copaY, vec.z);

                frutas.push(fruta);
                grupo.add(fruta);
            }
            grupo.position.set(x, 0, z);
            scene.add(grupo);
        }

        // --- FUNCIÓN DE RECOGIDA CORREGIDA ---
        function onSelectStart(event) {
            const controller = event.target;
            
            // Creamos una matriz para obtener la dirección real del mando
            const tempMatrix = new THREE.Matrix4();
            tempMatrix.extractRotation(controller.matrixWorld);

            // Configuramos el raycaster desde la posición del mando hacia adelante (-Z)
            raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
            raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

            const intersects = raycaster.intersectObjects(frutas);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                // Distancia máxima de 5 metros (coincide con el láser)
                if (intersects[0].distance < 5) {
                    object.visible = false;
                    // Lo sacamos de la escena y del array
                    scene.remove(object);
                    frutas = frutas.filter(f => f !== object);
                }
            }
        }

        function handleMovement(delta) {
            const session = renderer.xr.getSession();
            if (!session) return;

            for (const source of session.inputSources) {
                if (!source.gamepad) continue;
                const axes = source.gamepad.axes; 
                
                if (source.handedness === 'left') {
                    const speed = 4 * delta;
                    const dir = new THREE.Vector3();
                    camera.getWorldDirection(dir);
                    dir.y = 0; dir.normalize();
                    const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

                    playerGroup.position.addScaledVector(dir, -axes[3] * speed);
                    playerGroup.position.addScaledVector(side, axes[2] * speed);
                }
                if (source.handedness === 'right') {
                    playerGroup.rotation.y -= axes[2] * 2.5 * delta;
                }
            }
        }

        function render() {
            handleMovement(clock.getDelta()); 
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
